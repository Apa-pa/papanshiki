<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>計算ビリヤード - ぱぱん式</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="ranking.js"></script>
    <script src="sugoroku/mission.js"></script>
    <script type="module" src="firebase-ranking.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e0e0e0;
            font-family: "UD Digital Kyokasho-tai-R", "Zen Kaku Gothic New", sans-serif;
            touch-action: none;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            border: 10px solid #5d4037;
            border-radius: 10px;
            box-sizing: border-box;
            background-color: #4e342e;
        }

        #ui-header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            background-color: #4e342e;
            border-bottom: 5px solid #3e2723;
            z-index: 10;
        }

        #game-container {
            flex: 1;
            position: relative;
            width: 100%;
            background-color: #2e7d32;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .target-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 25px;
            border-radius: 30px;
            border: 4px solid #fbc02d;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin-bottom: 0;
        }

        .target-label {
            font-size: 14px;
            color: #5d4037;
            font-weight: bold;
            margin: 0;
        }

        .target-number {
            font-size: 32px;
            color: #d84315;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
            text-align: center;
        }

        h1 {
            color: #d84315;
            font-size: 36px;
            margin-bottom: 10px;
            font-family: serif;
        }

        .btn {
            background: #d84315;
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px #bf360c;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: none;
        }

        .back-link {
            margin-top: 20px;
            color: #8d6e63;
            text-decoration: underline;
            font-size: 16px;
        }

        /* キャラクター表示エリア */
        #character-area {
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            z-index: 100;
            pointer-events: none;
            /* キャラクター部分のタップは無効化（裏の操作を邪魔しない） */
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .char-icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .char-bubble {
            background: #fff;
            border: 3px solid #66bb6a;
            border-radius: 15px;
            padding: 10px 15px;
            margin-left: 10px;
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: bold;
            color: #2e7d32;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: relative;
            max-width: 200px;
            word-wrap: break-word;
        }

        /* 吹き出しのしっぽ */
        .char-bubble::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 15px;
            border-width: 10px 10px 0 0;
            border-style: solid;
            border-color: #66bb6a transparent transparent transparent;
        }

        .char-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 17px;
            border-width: 8px 8px 0 0;
            border-style: solid;
            border-color: #fff transparent transparent transparent;
        }
    </style>
</head>

<body>
    <div id="app-wrapper">
        <div id="ui-header">
            <div style="font-size: 18px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;">
                スコア: <span id="score">0</span><br>
                残り回数: <span id="shots-left" style="color:#ffeb3b; font-size: 24px;">3</span>
            </div>
            <div class="target-box">
                <p class="target-label">もくひょう</p>
                <p class="target-number" id="target-display">15</p>
            </div>
        </div>
        <div id="game-container">

            <!-- キャラクター通知エリア -->
            <div id="character-area">
                <img id="char-img" class="char-icon" src="hari-an.webp" alt="キャラクター">
                <div id="char-message" class="char-bubble">がんばってね！</div>
            </div>

            <div id="start-screen" class="overlay">
                <h1><ruby>計算<rt>けいさん</rt></ruby>ビリヤード</h1>
                <div style="font-size: 60px; margin: 10px;">🎱</div>
                <p
                    style="color:#5d4037; font-size:16px; line-height: 1.6; font-weight: bold; text-align: left; padding: 0 20px;">
                    【ルール】<br>
                    1. <ruby>手球<rt>てだま</rt></ruby>をひっぱって<ruby>弾<rt>はじ</rt></ruby>く！<br>
                    2. <ruby>場<rt>ば</rt></ruby>の<ruby>球<rt>たま</rt></ruby>に<ruby>当<rt>あ</rt></ruby>てると<ruby>数字<rt>すうじ
                        </rt></ruby>を「<ruby>吸収<rt>きゅうしゅう</rt></ruby>」する。<br>
                    3. <ruby>手球<rt>てだま</rt></ruby>の<ruby>数字<rt>すうじ</rt></ruby>を<span style="color:#d84315;">「<ruby>目標
                            <rt>もくひょう</rt>
                        </ruby>の<ruby>数字<rt>すうじ</rt></ruby>」にピッタリ<ruby>合<rt>あ</rt>
                        </ruby>わせよう。</span><br>
                    <br>
                    【ゲームオーバー<ruby>条件<rt>じょうけん</rt></ruby>】<br>
                    ❌ <ruby>目標<rt>もくひょう</rt></ruby>の<ruby>数字<rt>すうじ</rt></ruby>を<span
                        style="color:red">オーバー</span>した<br>
                    ❌ 「<ruby>残<rt>のこ</rt></ruby>り<ruby>回数<rt>かいすう</rt></ruby>」<ruby>以内<rt>いない</rt></ruby>に<span
                        style="color:red"><ruby>達成<rt>たっせい</rt></ruby>できなかった</span>
                </p>
                <button class="btn" onclick="startGame()">スタート</button>
                <br>
                <a href="index.html" class="back-link">🏠 ホームへもどる</a>
            </div>

            <div id="gameover-screen" class="overlay" style="display:none;">
                <h1 id="result-title" style="color:#5d4037;">ゲームオーバー</h1>
                <p id="result-reason" style="font-size:18px; color:#5d4037; font-weight:bold; margin-top: 0;"></p>
                <p style="font-size:24px; color:#d84315; font-weight:bold;">スコア: <span id="final-score">0</span></p>
                <button class="btn" onclick="startGame()">もういっかい</button>
                <br>
                <a href="index.html" class="back-link">🏠 ホームへ</a>
            </div>
        </div>

        <script>
            const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner, Bodies = Matter.Bodies, Body = Matter.Body, Composite = Matter.Composite, Mouse = Matter.Mouse, MouseConstraint = Matter.MouseConstraint, Events = Matter.Events, Vector = Matter.Vector;

            let engine, render, runner, mouseConstraint;
            let playerBall = null;
            let targetBalls = [];
            const container = document.getElementById('game-container');
            let gameW, gameH;
            let scaleFactor = 1;

            // ゲームステート
            let isPlaying = false;
            let score = 0;
            let level = 1;
            let targetNumber = 10;
            let shotsLeft = 3;
            const DEFAULT_SHOTS = 3;
            let shotsUsedThisLevel = 0; // 今のステージで何回打ったかカウント

            // 手球の状態
            let isAiming = false;
            let aimStartPos = null;
            let aimCurrentPos = null;
            let ballIsMoving = false;
            let hitAnyBallThisTurn = false;

            // 発射パワーの調整用
            const MAX_PULL_DISTANCE = 150; // これ以上引っ張っても線やパワーは伸びない

            // キャラクター要素
            const charArea = document.getElementById('character-area');
            const charImg = document.getElementById('char-img');
            const charMsg = document.getElementById('char-message');
            const charImages = ['hari-an.webp', 'hi-192.webp'];
            let characterHideTimer = null;

            function MathHelpers() {
                // 壁などの厚み
                const wallT = 50;
                return { wallT };
            }

            function init() {
                gameW = container.clientWidth;
                gameH = container.clientHeight;

                engine = Engine.create();
                // ビリヤードなので重力ゼロ
                engine.world.gravity.y = 0;
                engine.world.gravity.x = 0;

                render = Render.create({
                    element: container,
                    engine: engine,
                    options: { width: gameW, height: gameH, background: 'transparent', wireframes: false }
                });

                // 描画イベント（数字やガイドラインの描画）
                Events.on(render, 'afterRender', function () {
                    const context = render.context;

                    // 狙っている時のガイドライン（キュー線）描画
                    if (isAiming && playerBall && aimStartPos && aimCurrentPos) {
                        // 引っ張ったベクトル（逆向きに飛ばすパチンコ方式）
                        let dx = aimCurrentPos.x - aimStartPos.x;
                        let dy = aimCurrentPos.y - aimStartPos.y;

                        let forceLength = Math.sqrt(dx * dx + dy * dy);

                        // パワー（線の長さ）の上限を設定
                        if (forceLength > MAX_PULL_DISTANCE) {
                            const ratio = MAX_PULL_DISTANCE / forceLength;
                            dx *= ratio;
                            dy *= ratio;
                            forceLength = MAX_PULL_DISTANCE;
                        }

                        if (forceLength > 10) {
                            context.beginPath();
                            context.moveTo(playerBall.position.x, playerBall.position.y);
                            // 反対方向に伸ばす線を予測線として描く（2倍に伸ばして見やすく）
                            context.lineTo(playerBall.position.x - dx * 2, playerBall.position.y - dy * 2);

                            // 引くほど色が赤っぽくなり、太くなる演出
                            const pullRatio = forceLength / MAX_PULL_DISTANCE;
                            context.lineWidth = 2 + (pullRatio * 6); // 太さ2〜8

                            // 黄色 → オレンジ → 赤へ変化
                            const r = 255;
                            const g = Math.floor(255 - (pullRatio * 200));
                            const b = 0;
                            context.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.8)`;

                            context.setLineDash([10, 10]);
                            context.stroke();
                            context.setLineDash([]);
                        }
                    }

                    // ボールの数字を描画
                    Composite.allBodies(engine.world).forEach(b => {
                        if (b.mathVal !== undefined) {
                            context.save();
                            context.translate(b.position.x, b.position.y);
                            // 回転させないで数字を常にまっすぐ描画したい場合は rotate を外すか、角度を打ち消す
                            // context.rotate(b.angle); 

                            let fontSize = b.label === 'player' ? 24 : 20;
                            context.font = "bold " + fontSize + "px 'UD Digital Kyokasho-tai-R', sans-serif";
                            context.textAlign = "center";
                            context.textBaseline = "middle";

                            if (b.label === 'player') {
                                // 手球は白文字、アウトライン
                                context.strokeStyle = "#000";
                                context.lineWidth = 3;
                                context.strokeText(b.mathVal, 0, 0);
                                context.fillStyle = "#fff";
                                context.fillText(b.mathVal, 0, 0);
                            } else {
                                // 標的は黒文字
                                context.fillStyle = "#212121";
                                context.fillText(b.mathVal, 0, 0);
                            }
                            context.restore();
                        }
                    });
                });

                // 定期的な更新チェック（ボールが止まったかどうかの判定）
                Events.on(engine, 'afterUpdate', function () {
                    if (!isPlaying || !playerBall) return;

                    if (ballIsMoving) {
                        // スピードがほぼ0になったら停止とみなす
                        if (playerBall.speed < 0.2) {
                            // 完全に止める
                            Body.setVelocity(playerBall, { x: 0, y: 0 });
                            Body.setAngularVelocity(playerBall, 0);
                            ballIsMoving = false;

                            onTurnEnd();
                        }
                    }
                });

                // 衝突：手球と標的球
                Events.on(engine, 'collisionStart', function (event) {
                    if (!isPlaying) return;
                    event.pairs.forEach(pair => {
                        let a = pair.bodyA, b = pair.bodyB;
                        let isTargetHit = (a.label === 'player' && b.label === 'target') || (a.label === 'target' && b.label === 'player');

                        if (isTargetHit) {
                            hitAnyBallThisTurn = true;

                            let target = a.label === 'target' ? a : b;

                            // 吸収処理（足し算）
                            playerBall.mathVal += target.mathVal;

                            // 当たった球は消す
                            Composite.remove(engine.world, target);
                            targetBalls = targetBalls.filter(t => t !== target);

                            // ちょっと光る（吸収エフェクト）
                            container.style.boxShadow = "inset 0 0 50px rgba(255, 235, 59, 0.6)";
                            setTimeout(() => container.style.boxShadow = "0 0 20px rgba(0,0,0,0.4)", 150);
                        }
                    });
                });

                window.addEventListener('resize', handleResize);
                runner = Runner.create();

                // マウス操作（ドラッグして弾く処理）
                setupMouseInteraction();
            }

            function handleResize() {
                gameW = container.clientWidth;
                gameH = container.clientHeight;
                if (render) {
                    render.canvas.width = gameW;
                    render.canvas.height = gameH;
                }
            }

            function setupMouseInteraction() {
                // 画面のどこを触っても「狙い」をつけられるようにする
                container.addEventListener('pointerdown', (e) => {
                    if (ballIsMoving || !isPlaying || e.target.closest('button')) return;
                    isAiming = true;
                    const bounds = container.getBoundingClientRect();
                    aimStartPos = {
                        x: e.clientX - bounds.left,
                        y: e.clientY - bounds.top
                    };
                    aimCurrentPos = { ...aimStartPos };
                });

                window.addEventListener('pointermove', (e) => {
                    if (!isAiming) return;
                    const bounds = container.getBoundingClientRect();
                    aimCurrentPos = {
                        x: e.clientX - bounds.left,
                        y: e.clientY - bounds.top
                    };
                });

                window.addEventListener('pointerup', (e) => {
                    if (!isAiming || !playerBall) return;
                    isAiming = false;

                    let dx = aimCurrentPos.x - aimStartPos.x;
                    let dy = aimCurrentPos.y - aimStartPos.y;
                    let forceLength = Math.sqrt(dx * dx + dy * dy);

                    // パワーの上限クリップ（描画と同じく）
                    if (forceLength > MAX_PULL_DISTANCE) {
                        const ratio = MAX_PULL_DISTANCE / forceLength;
                        dx *= ratio;
                        dy *= ratio;
                        forceLength = MAX_PULL_DISTANCE;
                    }

                    // 引っ張ったベクトルを反転して力を加える
                    if (forceLength > 10) {
                        // applyForceではなくsetVelocityを使用して確実に加速させる
                        const velocityMultiplier = 0.15;
                        Body.setVelocity(playerBall, {
                            x: -dx * velocityMultiplier,
                            y: -dy * velocityMultiplier
                        });

                        ballIsMoving = true;
                        hitAnyBallThisTurn = false;
                        shotsLeft--;
                        shotsUsedThisLevel++;
                        updateUI();
                    }
                });
            }

            function createEnvironment() {
                const w = MathHelpers().wallT;
                const wallOpt = {
                    isStatic: true,
                    restitution: 0.5, // 壁での跳ね返りを抑える
                    render: { fillStyle: '#4e342e' } // 茶色い枠
                };

                Composite.add(engine.world, [
                    Bodies.rectangle(gameW / 2, -w / 2, gameW + w * 2, w, wallOpt), // 上壁
                    Bodies.rectangle(gameW / 2, gameH + w / 2, gameW + w * 2, w, wallOpt), // 下壁
                    Bodies.rectangle(-w / 2, gameH / 2, w, gameH + w * 2, wallOpt), // 左壁
                    Bodies.rectangle(gameW + w / 2, gameH / 2, w, gameH + w * 2, wallOpt) // 右壁
                ]);
            }

            function setupLevel(carryOverVal = null) {
                // ステージ生成
                // 既存のボールをクリア
                if (playerBall) Composite.remove(engine.world, playerBall);
                targetBalls.forEach(b => Composite.remove(engine.world, b));
                targetBalls = [];

                // 手球の初期値（引継ぎがあればそれを使う）
                const playerInitialVal = carryOverVal !== null ? carryOverVal : 1;

                // ボール数は4〜5個
                const totalBalls = 4 + Math.floor(Math.random() * 2); // 4 or 5
                // 正解ルートのボール数（2〜3個）
                const answerCount = 2 + Math.floor(Math.random() * 2); // 2 or 3
                const distractorCount = totalBalls - answerCount;

                // 目標増分（最低10、レベルが上がると少しずつ増える）
                const minIncrease = 10 + Math.floor(level / 3) * 2;
                const maxIncrease = minIncrease + 4;
                const increase = minIncrease + Math.floor(Math.random() * (maxIncrease - minIncrease + 1));

                targetNumber = playerInitialVal + increase;

                // 「正解ボール」の数字を生成（合計が increase になるように）
                // 各ボールは1〜9の範囲
                let answerValues = [];
                let remaining = increase;
                for (let i = 0; i < answerCount; i++) {
                    if (i === answerCount - 1) {
                        // 最後の1個で残りを全部まかなう
                        answerValues.push(remaining);
                    } else {
                        // 残りのボール数分は最低1ずつ確保して、残りからランダムに分配
                        const minVal = 1;
                        const maxVal = Math.min(9, remaining - (answerCount - i - 1));
                        const val = minVal + Math.floor(Math.random() * (maxVal - minVal + 1));
                        answerValues.push(val);
                        remaining -= val;
                    }
                }

                // 「おとりボール」の数字を生成（1〜9のランダム）
                let distractorValues = [];
                for (let i = 0; i < distractorCount; i++) {
                    distractorValues.push(Math.floor(Math.random() * 9) + 1);
                }

                // 全ボールの数字をシャッフルして配置（正解とおとりの区別をなくす）
                let tableValues = [...answerValues, ...distractorValues];
                tableValues.sort(() => 0.5 - Math.random());

                // 5ステージクリア後は残り回数を2回に変更
                shotsLeft = (level > 5) ? 2 : DEFAULT_SHOTS;
                shotsUsedThisLevel = 0; // ショットカウントリセット

                // === 手球の配置 ===
                playerBall = Bodies.circle(gameW / 2, gameH - 120, 20, {
                    restitution: 0.6, // 弾性（跳ね返りを抑えめに）
                    friction: 0.001,
                    frictionAir: 0.02, // 空気抵抗を上げて適度に減速
                    density: 0.05,
                    collisionFilter: { category: 0x0002, mask: 0xFFFF }, // 手球扱い
                    render: { fillStyle: '#e53935', strokeStyle: '#b71c1c', lineWidth: 2 }, // 赤い球
                    label: 'player'
                });
                playerBall.mathVal = playerInitialVal;
                Composite.add(engine.world, playerBall);

                // === 標的球の配置 ===
                // 画面の上半分〜中央あたりにランダム配置
                const pad = 50;
                for (let i = 0; i < totalBalls; i++) {
                    let rx = pad + Math.random() * (gameW - pad * 2);
                    let ry = pad + Math.random() * (gameH * 0.55); // 上半分〜中央あたり

                    let tb = Bodies.circle(rx, ry, 16, {
                        restitution: 0.4, // ぶつかっても散らばりにくい
                        friction: 0.005,
                        frictionAir: 0.04, // 標的はすぐ止まるように
                        density: 0.04,
                        collisionFilter: { category: 0x0004, mask: 0xFFFF },
                        render: { fillStyle: '#ffeb3b', strokeStyle: '#fbc02d', lineWidth: 2 }, // 黄色い球
                        label: 'target'
                    });
                    tb.mathVal = tableValues[i];
                    targetBalls.push(tb);
                    Composite.add(engine.world, tb);
                }

                updateUI();
            }

            function onTurnEnd() {
                // 手球が完全に止まったときに呼ばれる判定処理
                if (!isPlaying) return;

                updateUI();

                // 1. ゴール判定
                if (playerBall.mathVal === targetNumber) {
                    // クリア！
                    container.style.boxShadow = "inset 0 0 50px rgba(76, 175, 80, 0.8)";
                    setTimeout(() => container.style.boxShadow = "0 0 20px rgba(0,0,0,0.4)", 500);

                    score += 100;

                    // 1発クリアボーナス
                    if (shotsUsedThisLevel === 1) {
                        score += 100;
                    }

                    level++;
                    let carryOver = playerBall.mathVal;

                    // 完全クリアボーナス
                    if (level > 10) {
                        score += 200; // 完全クリアボーナス
                        showCharacterMessage("すごい！ぜんぶ<ruby>達成<rt>たっせい</rt></ruby>だよ！", "both", true);
                        gameOver("🎉 全ステージクリア！おみごと！", true);
                        return;
                    }

                    showCharacterMessage("ピッタリ！その<ruby>調子<rt>ちょうし</rt></ruby>！");
                    // 少し待ってから次のレベルへ
                    setTimeout(() => setupLevel(carryOver), 1500); // メッセージを読む時間を考慮して少し延ばす
                    return;
                }

                // 2. オーバー判定
                if (playerBall.mathVal > targetNumber) {
                    showCharacterMessage("ああっ！オーバーしちゃった！", "both", true);
                    gameOver("目標の数字を超えてしまった！");
                    return;
                }

                // 3. 回数切れ判定
                if (shotsLeft <= 0) {
                    showCharacterMessage("ざんねん…また<ruby>挑戦<rt>ちょうせん</rt></ruby>してね！", "both", true);
                    gameOver("弾ける回数がなくなってしまった！");
                    return;
                }

                // 次のショットへの応援
                if (shotsLeft > 0) {
                    let diff = targetNumber - playerBall.mathVal;
                    if (diff <= 3) {
                        showCharacterMessage("あとすこし！きをつけて！");
                    } else if (diff >= 15) {
                        showCharacterMessage("もっと<ruby>大<rt>おお</rt></ruby>きな<ruby>数<rt>かず</rt></ruby>をねらおう！");
                    } else {
                        const msgs = ["いいかんじ！", "よーくねらって！", "がんばれ！"];
                        showCharacterMessage(msgs[Math.floor(Math.random() * msgs.length)]);
                    }
                }
            }

            // キャラクターに喋らせる関数
            function showCharacterMessage(text, character = "random", persist = false) {
                if (character === "ann") {
                    charImg.src = "hari-an.webp";
                } else if (character === "hii") {
                    charImg.src = "hi-192.webp";
                } else {
                    // random または both はランダムに選ぶ
                    charImg.src = charImages[Math.floor(Math.random() * charImages.length)];
                }

                charMsg.innerHTML = text;
                charArea.style.opacity = 1;

                if (characterHideTimer) {
                    clearTimeout(characterHideTimer);
                }

                if (!persist) {
                    // 数秒後に消す
                    characterHideTimer = setTimeout(() => {
                        charArea.style.opacity = 0;
                    }, 3000);
                }
            }

            function updateUI() {
                document.getElementById('score').textContent = score;
                document.getElementById('target-display').textContent = targetNumber;
                document.getElementById('shots-left').textContent = shotsLeft;
            }

            function startGame() {
                handleResize();
                if (!engine) init();

                Composite.clear(engine.world);
                Engine.clear(engine);

                createEnvironment();

                isPlaying = true;
                score = 0;
                level = 1;

                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('gameover-screen').style.display = 'none';

                setupLevel();

                Render.run(render);
                Runner.run(runner, engine);
            }

            function gameOver(reasonText, isClear = false) {
                isPlaying = false;
                Runner.stop(runner);

                if (isClear) {
                    // 完全クリア！緑フラッシュ
                    container.style.boxShadow = "inset 0 0 80px rgba(76, 175, 80, 0.8)";
                    document.getElementById('result-title').textContent = '🎉 おみごと！';
                    document.getElementById('result-title').style.color = '#2e7d32';
                } else {
                    // ゲームオーバー：赤フラッシュ
                    container.style.boxShadow = "inset 0 0 80px rgba(244, 67, 54, 0.8)";
                    document.getElementById('result-title').textContent = 'ゲームオーバー';
                    document.getElementById('result-title').style.color = '#5d4037';
                }

                document.getElementById('final-score').textContent = score;
                document.getElementById('result-reason').textContent = reasonText;
                document.getElementById('gameover-screen').style.display = 'flex';

                if (typeof showSaveDialog === 'function') {
                    // 獲得ポイント = スコアの10分の1（切り捨て、最低1）
                    const earnedPoint = Math.max(1, Math.floor(score / 10));
                    showSaveDialog('math_strike', score, earnedPoint, (selectedUserName) => {
                        // ミッション達成記録
                        if (selectedUserName && typeof addMissionStock === 'function') {
                            addMissionStock(selectedUserName, 'math_strike');
                        }
                    });
                }
            }
        </script>
</body>

</html>
