<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フィンガーチェス〜ゆび計算/マッチ/割り勘〜</title>
    <script src="ranking.js"></script>
    <style>
        body {
            font-family: "UD Digital Kyokasho-tai-R", "Helvetica Neue", Arial, Meiryo, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            position: relative;
            min-height: 550px;
            border: 4px solid #e0f7fa;
        }

        /* タイトル・セットアップ */
        #setup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 26px;
        }

        .setup-btn {
            width: 240px;
            padding: 15px;
            margin: 12px;
            font-size: 1.2rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1);
        }

        .btn-easy {
            background: #81c784;
            box-shadow: 0 6px 0 #66bb6a;
        }

        .btn-normal {
            background: #64b5f6;
            box-shadow: 0 6px 0 #42a5f5;
        }

        .btn-hard {
            background: #ef5350;
            box-shadow: 0 6px 0 #e53935;
        }

        .setup-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.8rem;
            color: #ff9800;
            margin-top: 0;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1rem;
            color: #78909c;
        }

        .turn-indicator {
            font-weight: bold;
            font-size: 1.4rem;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 20px;
            background: #e8f5e9;
            border: 3px solid #c8e6c9;
            transition: 0.3s;
        }

        .player-turn {
            color: #ff9800;
            background: #fff3e0;
            border-color: #ffe0b2;
        }

        .cpu-turn {
            color: #2196f3;
            background: #e3f2fd;
            border-color: #bbdefb;
        }

        .hand-area {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
            align-items: center;
        }

        .player-label {
            font-weight: bold;
            font-size: 1.1rem;
            color: #546e7a;
            width: 80px;
        }

        .hand {
            width: 90px;
            height: 120px;
            border: 4px solid #cfd8dc;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            background: #fafafa;
            color: #455a64;
            user-select: none;
            box-shadow: 0 4px 0 #cfd8dc;
        }

        .hand.selected {
            border-color: #ff9800;
            background: #fff3e0;
            transform: translateY(-8px);
            box-shadow: 0 12px 0 rgba(255, 152, 0, 0.2);
        }

        .hand.disabled {
            opacity: 0.3;
            cursor: default;
            background: #eeeeee;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 15px;
            border: none;
            background: #bdbdbd;
            color: white;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 0 #9e9e9e;
        }

        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9e9e9e;
        }

        button#split-btn {
            background: #ff9800;
            box-shadow: 0 4px 0 #e68a00;
        }

        button#split-btn:disabled {
            background: #ffccbc;
            box-shadow: 0 4px 0 #ffab91;
            opacity: 0.6;
            cursor: default;
        }

        .log-container {
            margin-top: 25px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 20px;
            height: 100px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.9rem;
            border: 2px solid #e0e0e0;
            line-height: 1.6;
        }

        .log-warn {
            color: #d32f2f;
            font-weight: bold;
        }

        /* モーダル (再分配) */
        #modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 26px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .split-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .split-opt-btn {
            background: #e1f5fe;
            color: #0288d1;
            border: 3px solid #b3e5fc;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.4rem;
            width: 120px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #b3e5fc;
        }

        .split-opt-btn:hover {
            background: #b3e5fc;
        }

        .split-opt-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b3e5fc;
        }

        #result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 300;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 26px;
        }
    </style>
</head>

<body>

    <div class="game-container">
        <div id="setup-overlay">
            <h2 style="margin-bottom: 20px;"><ruby>難易度<rt>なんいど</rt></ruby>をえらんでね</h2>
            <button class="setup-btn btn-easy" onclick="startGame(1, '初級')"><ruby>初級<rt>しょきゅう</rt></ruby> (1<ruby>手<rt>て
                    </rt></ruby><ruby>読<rt>よ</rt></ruby>み)</button>
            <button class="setup-btn btn-normal" onclick="startGame(3, '中級')"><ruby>中級<rt>ちゅうきゅう</rt></ruby> (3<ruby>手
                    <rt>て</rt></ruby><ruby>読<rt>よ</rt></ruby>み)</button>
            <button class="setup-btn btn-hard" onclick="startGame(5, '上級')"><ruby>上級<rt>じょうきゅう</rt></ruby> (5<ruby>手<rt>
                        て</rt></ruby><ruby>読<rt>よ</rt></ruby>み)</button>
        </div>

        <!-- 再分配モーダル -->
        <div id="modal-overlay">
            <div class="modal-content">
                <h3 style="margin-top:0;"><ruby>合計<rt>ごうけい</rt></ruby> <span id="split-total">0</span> をどう分ける？</h3>
                <div id="split-options-container" class="split-options">
                    <!-- JavaScriptでボタンを生成 -->
                </div>
                <button onclick="closeSplitModal()"
                    style="margin-top:25px; background:#78909c; box-shadow:0 4px 0 #546e7a;">やめる</button>
            </div>
        </div>

        <!-- 結果オーバーレイ -->
        <div id="result-overlay">
            <h2 style="margin-bottom: 20px; color:#ff9800; font-size:2rem;">ゲーム終了！</h2>
            <button class="setup-btn btn-normal" onclick="location.reload()"><ruby>レベル選択<rt>せんたく</rt>
                    </ruby>にもどる</button>
            <button class="setup-btn" onclick="location.href='index.html'"
                style="background:#ef5350; box-shadow: 0 6px 0 #e53935;">ホームにもどる</button>
        </div>

        <h1>ゆび<ruby>計算<rt>けいさん</rt></ruby>：<ruby>戦略版<rt>せんりゃくばん</rt></ruby></h1>
        <div class="status-bar">
            <span id="level-display"><ruby>難易度<rt>なんいど</rt></ruby>: ---</span>
            <span id="history-count">ターン: 0</span>
        </div>
        <div id="turn-display" class="turn-indicator">---</div>

        <div class="hand-area">
            <div class="player-label">CPU</div>
            <div id="p2-left" class="hand" onclick="selectHand('p2', 0)">1</div>
            <div id="p2-right" class="hand" onclick="selectHand('p2', 1)">1</div>
        </div>

        <div class="hand-area">
            <div class="player-label">あなた</div>
            <div id="p1-left" class="hand" onclick="selectHand('p1', 0)">1</div>
            <div id="p1-right" class="hand" onclick="selectHand('p1', 1)">1</div>
        </div>

        <!-- 再分配ボタンをプレーヤーの指のすぐ下に移動 -->
        <div style="text-align: center; margin-top:-10px; margin-bottom: 15px;">
            <button id="split-btn" onclick="openSplitModal()" disabled><ruby>再分配<rt>さいぶんぱい</rt></ruby> (わける)</button>
        </div>

        <div class="log-container" id="game-log"></div>

        <div class="controls">
            <button onclick="location.reload()" style="background:#64b5f6; box-shadow: 0 4px 0 #42a5f5;"><ruby>レベル選択<rt>
                        せんたく</rt></ruby>にもどる</button>
            <button onclick="location.href='index.html'"
                style="background:#ef5350; box-shadow: 0 4px 0 #d32f2f;">ホームにもどる</button>
        </div>
    </div>

    <script>
        let state = {
            p1: [1, 1], p2: [1, 1],
            turn: null, selectedSide: null,
            isGameOver: false, isCpuThinking: false,
            cpuDepth: 1, history: []
        };

        function getHandSVG(val, isLeftHand, isP2) {
            const rotation = isP2 ? 'transform="rotate(180 50 60)"' : '';
            const skinColor = val === 0 ? '#eeeeee' : '#ffe0b2';
            const skinStroke = val === 0 ? '#bdbdbd' : '#fb8c00';
            const strokeW = 3;

            const positions = {
                pinky: { y: 35, h: 35, fy: 60, fh: 20 },
                ring: { y: 15, h: 55, fy: 60, fh: 25 },
                middle: { y: 5, h: 65, fy: 60, fh: 28 },
                index: { y: 15, h: 55, fy: 60, fh: 25 }
            };

            let fingers = [];
            if (isLeftHand) {
                fingers = [
                    { id: 'pinky', isExt: val >= 4, x: 19, ...positions.pinky },
                    { id: 'ring', isExt: val >= 3, x: 35, ...positions.ring },
                    { id: 'middle', isExt: val >= 2, x: 51, ...positions.middle },
                    { id: 'index', isExt: val >= 1, x: 67, ...positions.index }
                ];
            } else {
                fingers = [
                    { id: 'index', isExt: val >= 1, x: 19, ...positions.index },
                    { id: 'middle', isExt: val >= 2, x: 35, ...positions.middle },
                    { id: 'ring', isExt: val >= 3, x: 51, ...positions.ring },
                    { id: 'pinky', isExt: val >= 4, x: 67, ...positions.pinky }
                ];
            }

            let extendedSVG = "";
            let foldedSVG = "";

            fingers.forEach(f => {
                if (f.isExt) {
                    extendedSVG += `<rect x="${f.x}" y="${f.y}" width="14" height="${f.h}" rx="7" fill="${skinColor}" stroke="${skinStroke}" stroke-width="${strokeW}"/>`;
                } else {
                    foldedSVG += `<rect x="${f.x}" y="${f.fy}" width="14" height="${f.fh}" rx="7" fill="${skinColor}" stroke="${skinStroke}" stroke-width="${strokeW}"/>`;
                }
            });

            let thumbSVG = "";
            if (isLeftHand) {
                thumbSVG = `<rect x="70" y="65" width="22" height="15" rx="7" fill="${skinColor}" stroke="${skinStroke}" stroke-width="${strokeW}" transform="rotate(-30, 70, 65)"/>`;
            } else {
                thumbSVG = `<rect x="8" y="65" width="22" height="15" rx="7" fill="${skinColor}" stroke="${skinStroke}" stroke-width="${strokeW}" transform="rotate(30, 30, 65)"/>`;
            }

            let palmSVG = `<rect x="15" y="55" width="70" height="60" rx="15" fill="${skinColor}" stroke="${skinStroke}" stroke-width="${strokeW}"/>`;

            let crossSVG = "";
            if (val === 0) {
                crossSVG = `
                    <line x1="20" y1="20" x2="80" y2="100" stroke="#ef5350" stroke-width="8" stroke-linecap="round" />
                    <line x1="80" y1="20" x2="20" y2="100" stroke="#ef5350" stroke-width="8" stroke-linecap="round" />
                `;
            }

            let numberSVG = "";
            if (val > 0) {
                numberSVG = `<text x="50" y="95" font-size="32" fill="#d84315" font-weight="bold" text-anchor="middle" font-family="'UD Digital Kyokasho-tai-R', 'Helvetica Neue', Arial, sans-serif">${val}</text>`;
            }

            return `
            <svg viewBox="0 0 100 120" style="width:100%; height:100%; display:block;">
                <g ${rotation}>
                    ${extendedSVG}
                    ${thumbSVG}
                    ${palmSVG}
                    ${foldedSVG}
                </g>
                ${crossSVG}
                ${numberSVG}
            </svg>`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            ['p1', 'p2'].forEach(p => {
                [0, 1].forEach(i => {
                    const el = document.getElementById(`${p}-${i === 0 ? 'left' : 'right'}`);
                    const val = state[p][i];
                    const isLeftHand = (p === 'p1' && i === 0) || (p === 'p2' && i === 1);
                    const isP2 = (p === 'p2');
                    el.innerHTML = getHandSVG(val, isLeftHand, isP2);
                });
            });
        });

        function startGame(depth, label) {
            state.cpuDepth = depth;
            state.turn = Math.random() < 0.5 ? 'p1' : 'p2';
            document.getElementById('level-display').textContent = "難易度: " + label;
            document.getElementById('setup-overlay').style.display = 'none';
            state.history.push(getStateString(state.p1, state.p2));
            addLog(`ゲーム開始！ 片手の数字をわけて復活もOKだよ。`);
            if (state.turn === 'p2') { addLog("CPUが先攻です。"); setTimeout(cpuStrategy, 1000); }
            else { addLog("あなたが先攻です。"); }
            updateUI();
        }

        function getStateString(p1, p2) { return `P1:${p1[0]}-${p1[1]}|P2:${p2[0]}-${p2[1]}`; }

        function isThreefoldRepetition(nextStr) {
            let count = 0;
            for (let h of state.history) { if (h === nextStr) count++; }
            return count >= 2;
        }

        function updateUI() {
            ['p1', 'p2'].forEach(p => {
                [0, 1].forEach(i => {
                    const el = document.getElementById(`${p}-${(i === 0 ? 'left' : 'right')}`);
                    const val = state[p][i];
                    const isLeftHand = (p === 'p1' && i === 0) || (p === 'p2' && i === 1);
                    const isP2 = (p === 'p2');
                    el.innerHTML = getHandSVG(val, isLeftHand, isP2);
                    el.className = 'hand' + (val === 0 ? ' disabled' : '') +
                        (state.turn === 'p1' && p === 'p1' && state.selectedSide === i ? ' selected' : '');
                });
            });
            const turnEl = document.getElementById('turn-display');
            if (state.isGameOver) turnEl.textContent = "GAME OVER";
            else {
                turnEl.textContent = state.turn === 'p1' ? "あなたのばん" : "CPU思考中...";
                turnEl.className = "turn-indicator " + (state.turn === 'p1' ? "player-turn" : "cpu-turn");
            }
            document.getElementById('history-count').textContent = `ターン: ${state.history.length}`;
            // 分配は合計が2以上あればいつでも可能
            document.getElementById('split-btn').disabled =
                state.isGameOver || state.isCpuThinking || state.turn !== 'p1' || state.selectedSide !== null || (state.p1[0] + state.p1[1] < 2);
        }

        function addLog(msg, type = '') {
            const log = document.getElementById('game-log');
            log.innerHTML += `<div${type ? ' class="log-' + type + '"' : ''}>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function selectHand(player, sideIndex) {
            if (state.isGameOver || state.isCpuThinking || state.turn !== 'p1') return;
            if (player === 'p1') {
                if (state.p1[sideIndex] === 0) return; // 消えた手は選べない
                state.selectedSide = (state.selectedSide === sideIndex) ? null : sideIndex;
            } else if (state.selectedSide !== null && state.p2[sideIndex] !== 0) {
                const nextP2 = [...state.p2];
                nextP2[sideIndex] = (nextP2[sideIndex] + state.p1[state.selectedSide]) % 5;
                const nextStr = getStateString(state.p1, nextP2);
                if (isThreefoldRepetition(nextStr)) { addLog("その手は3回同じ盤面になるので禁止です！", "warn"); state.selectedSide = null; }
                else { executeMove('attack', { attacker: 'p1', attackerSide: state.selectedSide, targetSide: sideIndex }); }
            }
            updateUI();
        }

        function openSplitModal() {
            if (state.isGameOver || state.isCpuThinking || state.turn !== 'p1') return;
            const total = state.p1[0] + state.p1[1];
            document.getElementById('split-total').textContent = total;
            const container = document.getElementById('split-options-container');
            container.innerHTML = '';

            // 有効な分配パターンを抽出
            const moves = getAllMoves(state, 'p1').filter(m => m.type === 'split');

            moves.forEach(m => {
                const btn = document.createElement('button');
                btn.className = 'split-opt-btn';
                btn.style.padding = '5px';
                btn.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; gap:10px; height: 50px;">
                        <div style="width:40px; height:50px;">${getHandSVG(m.newVals[0], true, false)}</div>
                        <span style="font-size:1.4rem; color:#0288d1; font-weight:bold; line-height:1;">|</span>
                        <div style="width:40px; height:50px;">${getHandSVG(m.newVals[1], false, false)}</div>
                    </div>`;
                // 同一盤面（3回繰り返し）チェック
                const nextStr = getStateString(m.newVals, state.p2);
                if (isThreefoldRepetition(nextStr)) {
                    btn.disabled = true;
                    btn.style.opacity = '0.3';
                } else {
                    btn.onclick = () => {
                        executeMove('split', { player: 'p1', newVals: m.newVals });
                        closeSplitModal();
                    };
                }
                container.appendChild(btn);
            });

            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeSplitModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function executeMove(type, params) {
            if (type === 'attack') {
                const { attacker, attackerSide, targetSide } = params;
                const targetP = attacker === 'p1' ? 'p2' : 'p1';
                state[targetP][targetSide] = (state[targetP][targetSide] + state[attacker][attackerSide]) % 5;
                addLog(`${attacker === 'p1' ? 'あなた' : 'CPU'}が攻撃`);
            } else {
                state[params.player] = params.newVals;
                addLog(`${params.player === 'p1' ? 'あなた' : 'CPU'}が再分配`);
            }
            state.history.push(getStateString(state.p1, state.p2));
            if (checkWin()) return;
            state.selectedSide = null; state.turn = (state.turn === 'p1') ? 'p2' : 'p1';
            updateUI();
            if (state.turn === 'p2') setTimeout(cpuStrategy, 800);
        }

        function cpuStrategy() {
            if (state.isGameOver) return;
            state.isCpuThinking = true; updateUI();
            const bestMove = getBestMove(state, state.cpuDepth);
            state.isCpuThinking = false;
            if (bestMove) {
                if (bestMove.type === 'attack') executeMove('attack', { attacker: 'p2', attackerSide: bestMove.attackerSide, targetSide: bestMove.targetSide });
                else executeMove('split', { player: 'p2', newVals: bestMove.newVals });
            } else { addLog("CPUが詰みました！あなたの勝ちです。", "warn"); state.isGameOver = true; updateUI(); }
        }

        function getBestMove(curr, depth) {
            let moves = getAllMoves(curr, 'p2').filter(m => {
                const next = simulateMove(curr, m, 'p2');
                return !isThreefoldRepetition(getStateString(next.p1, next.p2));
            });
            let bestScore = -Infinity; let bestMove = null;
            for (let m of moves) {
                let score = minimax(simulateMove(curr, m, 'p2'), depth - 1, false, -Infinity, Infinity);
                if (score > bestScore) { bestScore = score; bestMove = m; }
            }
            return bestMove;
        }

        function minimax(s, depth, isMax, alpha, beta) {
            const win = getWinner(s);
            if (win === 'p2') return 1000 + depth;
            if (win === 'p1') return -1000 - depth;
            if (depth <= 0) return (s.p2[0] + s.p2[1]) * 10 - (s.p1[0] + s.p1[1]) * 10;
            if (isMax) {
                let maxE = -Infinity;
                for (let m of getAllMoves(s, 'p2')) {
                    maxE = Math.max(maxE, minimax(simulateMove(s, m, 'p2'), depth - 1, false, alpha, beta));
                    alpha = Math.max(alpha, maxE); if (beta <= alpha) break;
                }
                return maxE;
            } else {
                let minE = Infinity;
                for (let m of getAllMoves(s, 'p1')) {
                    minE = Math.min(minE, minimax(simulateMove(s, m, 'p1'), depth - 1, true, alpha, beta));
                    beta = Math.min(beta, minE); if (beta <= alpha) break;
                }
                return minE;
            }
        }

        function getAllMoves(s, p) {
            let ms = []; let opp = (p === 'p1' ? 'p2' : 'p1');
            [0, 1].forEach(a => { if (s[p][a] > 0) [0, 1].forEach(t => { if (s[opp][t] > 0) ms.push({ type: 'attack', attackerSide: a, targetSide: t }); }); });
            let tot = s[p][0] + s[p][1];
            if (tot >= 2) {
                for (let i = 0; i <= Math.min(tot, 4); i++) {
                    let j = tot - i;
                    if (j < 5 && !(i === s[p][0] && j === s[p][1]) && !(i === s[p][1] && j === s[p][0])) ms.push({ type: 'split', newVals: [i, j] });
                }
            }
            return ms;
        }

        function simulateMove(s, m, p) {
            let ns = { p1: [...s.p1], p2: [...s.p2] };
            if (m.type === 'attack') {
                let target = (p === 'p1' ? 'p2' : 'p1');
                ns[target][m.targetSide] = (ns[target][m.targetSide] + ns[p][m.attackerSide]) % 5;
            } else { ns[p] = m.newVals; }
            return ns;
        }

        function getWinner(s) {
            if (s.p1[0] === 0 && s.p1[1] === 0) return 'p2';
            if (s.p2[0] === 0 && s.p2[1] === 0) return 'p1';
            return null;
        }

        function checkWin() {
            const win = getWinner(state);
            if (win) {
                state.isGameOver = true;
                updateUI();

                setTimeout(() => {
                    let pts = 20; // 負けは全レベル共通20pt
                    if (win === 'p1') {
                        if (state.cpuDepth === 1) pts = 30; // 初級
                        else if (state.cpuDepth === 3) pts = 50; // 中級
                        else if (state.cpuDepth === 5) pts = 100; // 上級
                    }

                    const onEnd = () => {
                        document.getElementById('result-overlay').style.display = 'flex';
                    };

                    if (typeof showPointGetDialog === 'function') {
                        showPointGetDialog(pts, onEnd);
                    } else {
                        alert(win === 'p1' ? "あなたの勝ち！\n" + pts + "pt獲得！" : "CPUの勝ち！\n20pt獲得！");
                        onEnd();
                    }
                }, 500);
                return true;
            }
            return false;
        }
    </script>
</body>

</html>
