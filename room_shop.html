<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>インテリアショップ</title>
    <script src="ranking.js"></script>
    <style>
        body {
            font-family: "UD Digital Kyokasho-tai-R", sans-serif;
            background-color: #e8f5e9;
            text-align: center;
            padding: 20px;
            color: #2e7d32;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .user-select-area {
            background: #c8e6c9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        select {
            padding: 10px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #81c784;
            width: 80%;
            max-width: 300px;
        }

        .status-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #1b5e20;
            color: white;
            padding: 10px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .point-box {
            font-size: 20px;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .item-card {
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 10px;
            transition: 0.2s;
            position: relative;
            background: #fff;
        }

        .item-card.owned {
            border-color: #81c784;
            background: #f1f8e9;
        }

        .badge-equipped {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ffca28;
            color: #5d4037;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            z-index: 2;
        }

        .item-img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fff;
        }

        .section-title {
            text-align: left;
            border-bottom: 2px solid #a5d6a7;
            padding-bottom: 5px;
            margin: 30px 0 15px 0;
            font-size: 20px;
            font-weight: bold;
            color: #388e3c;
        }

        .action-btn {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-buy {
            background: #ff7043;
            color: white;
        }

        .btn-equip {
            background: #66bb6a;
            color: white;
            margin-top: 2px;
            font-size: 11px;
            padding: 5px 0;
        }

        .btn-disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
        }

        .medal-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
        }

        .btn-remove {
            background: #ef9a9a;
            color: #b71c1c;
            margin-top: 2px;
            font-size: 11px;
            padding: 5px 0;
        }

        .back-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 30px;
            background: #bcaaa4;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }

        .room-link {
            display: inline-block;
            padding: 12px 30px;
            background: #26a69a;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px #00796b;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🪑 インテリアショップ</h1>
        <p>お部屋を すてきに もようがえ！</p>

        <div class="user-select-area">
            <label>だれのお買い物？</label><br>
            <select id="user-select" onchange="loadShop()">
                <option value="">(えらんでね)</option>
            </select>
        </div>

        <div id="shop-content" style="display:none;">
            <div class="status-bar">
                <div class="point-box">💰 <span id="current-points">0</span> pt</div>
            </div>

            <div class="section-title">🏠 お部屋 (壁と床)</div>
            <div id="room-list" class="item-grid"></div>

            <div class="section-title">🏆 勲章 (くんしょう)</div>
            <div id="medal-list" class="item-grid"></div>

            <div class="section-title">🖼️ 絵画 (かいが)</div>
            <div id="picture-list" class="item-grid"></div>

            <div class="section-title">🪑 家具 (かぐ)</div>
            <div id="furniture-list" class="item-grid"></div>
        </div>

        <div style="margin-top: 40px; display: flex; flex-direction: column; align-items: center;">
            <a href="room.html" class="room-link">🏠 マイルームへもどる</a>
            <a href="index.html" class="back-link">🏠 ホームへもどる</a>
        </div>
    </div>

    <script>
        const ROOMS = [
            { id: 'none', name: 'シンプルなお部屋', src: '', price: 0, desc: 'まっしろな お部屋' },
            { id: 'room_01', name: 'ひまわりのかべがみの部屋', src: 'room/room_01.jpg', price: 1000, desc: 'フローリングにかわいい花の壁紙' },
            { id: 'room_02', name: 'さわやか勉強部屋', src: 'room/room_02.jpg', price: 1500, desc: '水色のさわやかなへや' },
            { id: 'room_03', name: '木のおうち', src: 'room/room_03.jpg', price: 2000, desc: '木漏れ日がさすすてきな木のへや' },
            { id: 'room_04', name: 'こどもべや', src: 'room/room_04.webp', price: 1000, desc: 'かわいいかべがみのおへや' },
            { id: 'room_05', name: '和室', src: 'room/room_05.webp', price: 1200, desc: 'たたみの　お部屋' },
        ];

        const MEDALS = [
            { id: 'shield_silver', name: 'シルバーのたて', src: 'room/shield_silver.webp', requiredPoints: 100000, desc: '銀！100000ポイントの 証！' },
            { id: 'shield_gold', name: 'ゴールドのたて', src: 'room/shield_gold.webp', requiredPoints: 1000000, desc: '金！1000000ポイントの証！' }
        ];

        const PICTURES = [
            { id: 'pic_01', name: 'おだやかな森', src: 'room/pic_01.webp', price: 1000, desc: 'おしゃれな絵画1' },
            { id: 'pic_02', name: 'キツネのきょうだい', src: 'room/pic_02.webp', price: 800, desc: 'おしゃれな絵画2' }
        ];

        const FURNITURE = [
            { id: 'table_01', name: '木の勉強机', src: 'room/table_01.webp', price: 1500, desc: 'あたたかみのある 木製の勉強づくえ', width: 310 },
            { id: 'table_02', name: 'ふかふかベッド', src: 'room/table_02.webp', price: 1500, desc: 'あたたかそうな掛布団のベッド', width: 310 },
            { id: 'table_03', name: 'じょうひんベッド', src: 'room/table_03.webp', price: 2000, desc: 'レースがついててかわいいベッド', width: 310 },
            { id: 'table_04', name: '本だな1', src: 'room/table_04.webp', price: 600, desc: '本がきれいにならんでいない本だな', width: 250 },
            { id: 'table_05', name: '本だな2', src: 'room/table_05.webp', price: 700, desc: '本がきれいにならんでいる本だな', width: 250 },
            { id: 'an_doll', name: 'アンのおおきなぬいぐるみ', src: 'room/an_doll.webp', price: 800, desc: 'アンの　おおきなぬいぐるみ', width: 150 },
            { id: 'hi_doll', name: 'ヒーのおおきなぬいぐるみ', src: 'room/hi_doll.webp', price: 800, desc: 'ヒーの　おおきなぬいぐるみ', width: 150 }
        ];

        const DATA_KEY = 'papan_avatar_v1';

        function getUserData() { return JSON.parse(localStorage.getItem(DATA_KEY) || '{}'); }
        function saveUserData(data) { localStorage.setItem(DATA_KEY, JSON.stringify(data)); }

        window.onload = function () {
            if (typeof getUserNames !== 'function') { alert('ranking.js が読み込まれていません'); return; }
            const users = getUserNames();
            const select = document.getElementById('user-select');
            users.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u; opt.innerText = u;
                select.appendChild(opt);
            });
        };

        function loadShop() {
            const userName = document.getElementById('user-select').value;
            const shopContent = document.getElementById('shop-content');

            if (!userName) {
                shopContent.style.display = 'none';
                return;
            }
            shopContent.style.display = 'block';

            const currentPoints = getUserPoints(userName);
            document.getElementById('current-points').innerText = currentPoints;

            const allData = getUserData();
            const userData = allData[userName] || {};

            if (!userData.ownedRooms) userData.ownedRooms = ['none'];
            if (!userData.currentRoom) userData.currentRoom = 'none';
            if (!userData.ownedMedals) userData.ownedMedals = [];
            if (!userData.medals) userData.medals = {};
            if (!userData.ownedPictures) userData.ownedPictures = [];
            // 絵画はmedalsと同じスロットを共有する
            if (!userData.ownedFurniture) userData.ownedFurniture = [];
            if (!userData.furniture) userData.furniture = { left: null, right: null };

            // 1. お部屋
            const roomContainer = document.getElementById('room-list');
            roomContainer.innerHTML = '';
            ROOMS.forEach(item => {
                const isOwned = userData.ownedRooms.includes(item.id);
                const isEquipped = (userData.currentRoom === item.id);
                const canBuy = (currentPoints >= item.price);
                const card = document.createElement('div');
                card.className = `item-card ${isOwned ? 'owned' : ''}`;
                let btnHtml = '';
                if (isOwned) {
                    if (isEquipped) {
                        btnHtml = `<button class="action-btn btn-equipped">使用中</button><button class="action-btn btn-remove" onclick="unequipRoom('${userName}')">はずす</button>`;
                    } else {
                        btnHtml = `<button class="action-btn btn-equip" onclick="equipRoom('${userName}', '${item.id}')">もようがえ</button>`;
                    }
                } else {
                    btnHtml = canBuy ? `<button class="action-btn btn-buy" onclick="buyRoom('${userName}', '${item.id}', ${item.price})">${item.price}ptで購入</button>` : `<button class="action-btn btn-disabled">${item.price}pt (不足)</button>`;
                }
                card.innerHTML = `<img src="${item.src || 'https://placehold.jp/300x200.png?text=Simple'}" class="item-img"><div style="font-weight:bold;">${item.name}</div>${btnHtml}`;
                roomContainer.appendChild(card);
            });

            // 2. 勲章（一定ポイント所持で0ptで獲得できる仕組み）
            const medalContainer = document.getElementById('medal-list');
            medalContainer.innerHTML = '';
            MEDALS.forEach(item => {
                const isOwned = userData.ownedMedals.includes(item.id);
                // requiredPoints以上持っていれば獲得可能（ポイントは消費しない）
                const req = item.requiredPoints || 0;
                const canGet = (currentPoints >= req);

                // どこに飾っているかチェック
                const isEqL1 = (userData.medals.left1 === item.id);
                const isEqL2 = (userData.medals.left2 === item.id);
                const isEqR1 = (userData.medals.right1 === item.id);
                const isEqR2 = (userData.medals.right2 === item.id);

                let badge = '';
                if (isEqL1) badge = '<div class="badge-equipped">左1</div>';
                else if (isEqL2) badge = '<div class="badge-equipped">左2</div>';
                else if (isEqR1) badge = '<div class="badge-equipped">右1</div>';
                else if (isEqR2) badge = '<div class="badge-equipped">右2</div>';

                const card = document.createElement('div');
                card.className = `item-card ${isOwned ? 'owned' : ''}`;

                let btnHtml = '';
                if (isOwned) {
                    const isAnyEquipped = isEqL1 || isEqL2 || isEqR1 || isEqR2;
                    btnHtml = `
                    <div class="medal-btn-group">
                        <button class="action-btn btn-equip" onclick="equipMedal('${userName}', '${item.id}', 'left2')">左外</button>
                        <button class="action-btn btn-equip" onclick="equipMedal('${userName}', '${item.id}', 'left1')">左内</button>
                        <button class="action-btn btn-equip" onclick="equipMedal('${userName}', '${item.id}', 'right1')">右内</button>
                        <button class="action-btn btn-equip" onclick="equipMedal('${userName}', '${item.id}', 'right2')">右外</button>
                    </div>
                    ${isAnyEquipped ? `<button class="action-btn btn-remove" onclick="unequipMedal('${userName}', '${item.id}')">はずす</button>` : ''}`;
                } else if (canGet) {
                    btnHtml = `<button class="action-btn btn-buy" onclick="getMedal('${userName}', '${item.id}')">${req.toLocaleString()}pt達成！タダでもらう🎉</button>`;
                } else {
                    btnHtml = `<button class="action-btn btn-disabled">${req.toLocaleString()}pt 必要（あと ${(req - currentPoints).toLocaleString()}pt）</button>`;
                }

                card.innerHTML = `${badge}<img src="${item.src}" class="item-img"><div style="font-weight:bold;">${item.name}</div>${btnHtml}`;
                medalContainer.appendChild(card);
            });

            // 3. 絵画（勲章と同じ4スロットを共有: medals.left1/left2/right1/right2）
            const picContainer = document.getElementById('picture-list');
            picContainer.innerHTML = '';
            PICTURES.forEach(item => {
                const isOwned = userData.ownedPictures.includes(item.id);
                // 勲章と同じmedalsオブジェクトのスロットをチェック
                const isEqL1 = (userData.medals.left1 === item.id);
                const isEqL2 = (userData.medals.left2 === item.id);
                const isEqR1 = (userData.medals.right1 === item.id);
                const isEqR2 = (userData.medals.right2 === item.id);
                const canBuy = (currentPoints >= item.price);

                let badge = '';
                if (isEqL1) badge = '<div class="badge-equipped">左内に飾り中</div>';
                else if (isEqL2) badge = '<div class="badge-equipped">左外に飾り中</div>';
                else if (isEqR1) badge = '<div class="badge-equipped">右内に飾り中</div>';
                else if (isEqR2) badge = '<div class="badge-equipped">右外に飾り中</div>';

                const card = document.createElement('div');
                card.className = `item-card ${isOwned ? 'owned' : ''}`;

                let btnHtml = '';
                if (isOwned) {
                    const isAnyEquipped = isEqL1 || isEqL2 || isEqR1 || isEqR2;
                    btnHtml = `
                    <div class="medal-btn-group">
                        <button class="action-btn btn-equip" onclick="equipPicture('${userName}', '${item.id}', 'left2')">左外</button>
                        <button class="action-btn btn-equip" onclick="equipPicture('${userName}', '${item.id}', 'left1')">左内</button>
                        <button class="action-btn btn-equip" onclick="equipPicture('${userName}', '${item.id}', 'right1')">右内</button>
                        <button class="action-btn btn-equip" onclick="equipPicture('${userName}', '${item.id}', 'right2')">右外</button>
                    </div>
                    ${isAnyEquipped ? `<button class="action-btn btn-remove" onclick="unequipPicture('${userName}', '${item.id}')">はずす</button>` : ''}`;
                } else {
                    btnHtml = canBuy ? `<button class="action-btn btn-buy" onclick="buyPicture('${userName}', '${item.id}', ${item.price})">${item.price}pt購入</button>` : `<button class="action-btn btn-disabled">${item.price}pt (不足)</button>`;
                }

                card.innerHTML = `${badge}<img src="${item.src}" class="item-img" onerror="this.src='https://placehold.jp/150x150.png?text=Picture'"><div style="font-weight:bold; margin-top:5px;">${item.name}</div>${btnHtml}`;
                picContainer.appendChild(card);
            });

            // 4. 家具
            const furnContainer = document.getElementById('furniture-list');
            furnContainer.innerHTML = '';
            FURNITURE.forEach(item => {
                const isOwned = userData.ownedFurniture.includes(item.id);
                const isEqLeft = (userData.furniture.left === item.id);
                const isEqRight = (userData.furniture.right === item.id);
                const canBuy = (currentPoints >= item.price);

                const card = document.createElement('div');
                card.className = `item-card ${isOwned ? 'owned' : ''}`;

                let badge = isEqLeft ? `<div class="badge-equipped">左におき中</div>` : (isEqRight ? `<div class="badge-equipped">右におき中</div>` : '');
                let btnHtml = '';
                if (isOwned) {
                    const isAnyEquipped = isEqLeft || isEqRight;
                    btnHtml = `
                    <div style="display:flex; gap:5px;">
                        <button class="action-btn btn-equip" onclick="equipFurniture('${userName}', '${item.id}', 'left')">左におく</button>
                        <button class="action-btn btn-equip" onclick="equipFurniture('${userName}', '${item.id}', 'right')">右におく</button>
                    </div>
                    ${isAnyEquipped ? `<button class="action-btn btn-remove" onclick="unequipFurniture('${userName}', '${item.id}')">はずす</button>` : ''}`;
                } else {
                    btnHtml = canBuy ? `<button class="action-btn btn-buy" onclick="buyFurniture('${userName}', '${item.id}', ${item.price})">${item.price}pt購入</button>` : `<button class="action-btn btn-disabled">${item.price}pt (不足)</button>`;
                }

                card.innerHTML = `${badge}<img src="${item.src}" class="item-img" onerror="this.src='https://placehold.jp/150x150.png?text=Furniture'"><div style="font-weight:bold; margin-top:5px;">${item.name}</div>${btnHtml}`;
                furnContainer.appendChild(card);
            });
        }

        // --- 処理関数 ---
        function buyRoom(u, i, p) { if (confirm(`${p}ptで購入？`)) if (spendPoints(u, p)) { let d = getUserData(); if (!d[u]) d[u] = {}; if (!d[u].ownedRooms) d[u].ownedRooms = ['none']; d[u].ownedRooms.push(i); saveUserData(d); loadShop(); } }
        function equipRoom(u, i) { let d = getUserData(); d[u].currentRoom = i; saveUserData(d); loadShop(); }
        function unequipRoom(u) { let d = getUserData(); d[u].currentRoom = 'none'; saveUserData(d); loadShop(); }
        // 勲章の獲得（ポイント消費なし、条件はUI側で判定済み）
        function getMedal(u, i) {
            if (confirm('勲章をもらいますか？🏆')) {
                let d = getUserData();
                if (!d[u]) d[u] = {};
                if (!d[u].ownedMedals) d[u].ownedMedals = [];
                d[u].ownedMedals.push(i);
                saveUserData(d);
                alert('勲章をゲットしました！おめでとう！🎉');
                loadShop();
            }
        }

        // ★修正: 重複バグ対策済みの関数
        function equipMedal(u, i, s) {
            let d = getUserData();
            if (!d[u].medals) d[u].medals = {};

            // 1. 他の場所に同じ勲章があったら消す（移動のため）
            Object.keys(d[u].medals).forEach(key => {
                if (d[u].medals[key] === i) {
                    delete d[u].medals[key];
                }
            });

            // 2. 指定の場所にセット
            d[u].medals[s] = i;

            // 念のため古い互換キーも掃除
            if (d[u].medals.left === i) delete d[u].medals.left;
            if (d[u].medals.right === i) delete d[u].medals.right;

            saveUserData(d);
            loadShop();
        }

        // 勲章を全てはずす
        function unequipMedal(u, i) {
            let d = getUserData();
            if (!d[u].medals) return;
            Object.keys(d[u].medals).forEach(key => {
                if (d[u].medals[key] === i) delete d[u].medals[key];
            });
            saveUserData(d);
            loadShop();
        }

        // 絵画の購入
        function buyPicture(userName, itemId, price) {
            if (!confirm(`${price}ポイントで 購入しますか？`)) return;
            if (spendPoints(userName, price)) {
                const allData = getUserData();
                if (!allData[userName]) allData[userName] = {};
                if (!allData[userName].ownedPictures) allData[userName].ownedPictures = [];
                allData[userName].ownedPictures.push(itemId);
                saveUserData(allData);
                alert('購入しました！✨');
                loadShop();
            } else { alert('ポイントが足りないようです…'); }
        }

        // 絵画を飾る（勲章と同じmedalsスロットを使用）
        function equipPicture(userName, itemId, slot) {
            const allData = getUserData();
            if (!allData[userName].medals) allData[userName].medals = {};
            // 他のスロットに同じ絵がある場合は外す（移動のため）
            Object.keys(allData[userName].medals).forEach(key => {
                if (allData[userName].medals[key] === itemId) delete allData[userName].medals[key];
            });
            allData[userName].medals[slot] = itemId;
            saveUserData(allData);
            const slotNames = { left1: '左内', left2: '左外', right1: '右内', right2: '右外' };
            alert(`${slotNames[slot] || slot}に 飾りました！🖼️`);
            loadShop();
        }

        // 絵画をはずす（medalsスロットから削除）
        function unequipPicture(userName, itemId) {
            const allData = getUserData();
            if (!allData[userName].medals) return;
            Object.keys(allData[userName].medals).forEach(key => {
                if (allData[userName].medals[key] === itemId) delete allData[userName].medals[key];
            });
            saveUserData(allData);
            loadShop();
        }

        function buyFurniture(userName, itemId, price) {
            if (!confirm(`${price}ポイントで 購入しますか？`)) return;
            if (spendPoints(userName, price)) {
                const allData = getUserData();
                if (!allData[userName]) allData[userName] = {};
                if (!allData[userName].ownedFurniture) allData[userName].ownedFurniture = [];
                allData[userName].ownedFurniture.push(itemId);
                saveUserData(allData);
                alert('購入しました！✨');
                loadShop();
            } else { alert('ポイントが足りないようです…'); }
        }

        function equipFurniture(userName, itemId, side) {
            const allData = getUserData();
            if (!allData[userName].furniture) allData[userName].furniture = { left: null, right: null };
            allData[userName].furniture[side] = itemId;
            saveUserData(allData);
            alert(`${side === 'left' ? '左' : '右'}に おきました！🪑`);
            loadShop();
        }

        // 家具をはずす
        function unequipFurniture(userName, itemId) {
            const allData = getUserData();
            if (!allData[userName].furniture) return;
            Object.keys(allData[userName].furniture).forEach(key => {
                if (allData[userName].furniture[key] === itemId) allData[userName].furniture[key] = null;
            });
            saveUserData(allData);
            loadShop();
        }
    </script>
