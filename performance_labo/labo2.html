<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感覚測定ラボ（ラボ2）｜ぱぱん式 まなびポータル</title>
    <meta name="description" content="5つのミニゲームで、あなたの直感・感覚をはかろう！量・時間・空間・長さ・色">

    <!-- ぱぱん式 共通スクリプト -->
    <script src="../ranking.js"></script>

    <!-- Chart.js (レーダーチャート用) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- 共通スタイル -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== メインコンテナ ===== -->
    <div id="labo-container">

        <!-- ヘッダー -->
        <div id="labo-header">
            <span style="font-size:1.8rem;">🧪</span> <!-- ラボ2のテーマアイコン -->
            <div>
                <div class="header-title">感覚測定ラボ</div>
                <div class="header-sub">かんかくそくていプログラム</div>
            </div>
        </div>

        <!-- プログレスバー -->
        <div id="progress-bar-wrap">
            <div class="step-labels">
                <span class="step-label" id="step-label-0">🍎</span>
                <span class="step-label" id="step-label-1">🚆</span>
                <span class="step-label" id="step-label-2">🧊</span>
                <span class="step-label" id="step-label-3">📏</span>
                <span class="step-label" id="step-label-4">🎨</span>
                <span class="step-label" id="step-label-5">📊</span>
            </div>
            <div id="progress-bar-bg">
                <div id="progress-bar-fill"></div>
            </div>
        </div>

        <!-- フィードバックオーバーレイ（全シーン共通） -->
        <div id="feedback-overlay"></div>

        <!-- ===== タイトルシーン ===== -->
        <div class="scene active" id="title-scene">

            <!-- キャラクターナビ -->
            <div class="character-nav">
                <!-- ハリネズミのアンを使ってラボ2のガイドにする -->
                <img src="../hari-an.webp" alt="ハリネズミのアン" onerror="this.style.display='none'">
                <div class="speech-bubble">
                    5つのゲームで、きみのかんかく（直感）をはかるよ！<br>
                    パッと見てひらめいたものをえらぼう！
                </div>
            </div>

            <div class="scene-title">🧪 感覚測定ラボ</div>
            <div class="scene-title-sub">かんかくそくていプログラム</div>

            <!-- ゲーム一覧プレビュー -->
            <div class="game-list" id="game-list-preview">
                <!-- main2.js が動的に生成 -->
            </div>

            <button class="btn btn-accent" id="start-btn">
                ▶ そくていスタート！
            </button>
            <a href="results2.html" class="home-link" style="color:#5c6bc0;">📊 せいせきをみる</a>
            <a href="../index.html" class="home-link">🏠 ホームへもどる</a>
        </div>

        <!-- ===== カウントダウンシーン ===== -->
        <div class="scene" id="countdown-scene">
            <div style="text-align:center; padding-top:20px;">
                <div style="font-size:1rem; color:#777; margin-bottom:10px;">つぎのゲームがはじまるよ！</div>
                <div id="countdown-display" style="
                    font-size: 6rem;
                    font-weight: bold;
                    color: #5c6bc0;
                    animation: popIn 0.3s ease;
                ">3</div>
            </div>
        </div>

        <!-- ===== ゲームプレイシーン ===== -->
        <div class="scene" id="game-scene">

            <!-- ゲームバナー -->
            <div class="game-banner" id="game-banner">
                <div class="game-banner-icon">🍎</div>
                <div class="game-banner-text">
                    <div class="game-banner-name">ぱっと見どっち？</div>
                    <div class="game-banner-ability">りょうのかんかくをそくてい</div>
                </div>
            </div>

            <!-- ゲームコンテンツエリア -->
            <div id="game-area">
                <!-- 各ゲームJSが動的にHTMLを注入 -->
            </div>
        </div>

        <!-- ===== リザルトシーン ===== -->
        <div class="scene" id="result-scene">

            <!-- キャラクターナビ -->
            <div class="character-nav">
                <img src="../hi-192.webp" alt="エゾリスのヒー" onerror="this.style.display='none'">
                <div class="speech-bubble" id="result-summary">
                    けっかはっぴょう！きみの「かんかく」はどうかな？
                </div>
            </div>

            <div class="scene-title" style="margin-top:4px;">🏆 かんかく測定結果</div>

            <!-- レーダーチャート -->
            <div class="radar-wrap">
                <canvas id="radar-chart"></canvas>
            </div>

            <!-- スコア一覧 -->
            <div class="result-ability-list">
                <div class="result-ability-item">
                    <div class="result-ability-label">🍎 りょうのかんかく</div>
                    <div class="result-ability-score" id="result-score-quantity">--</div>
                </div>
                <div class="result-ability-item">
                    <div class="result-ability-label">🚆 スピードのかんかく</div>
                    <div class="result-ability-score" id="result-score-speed">--</div>
                </div>
                <div class="result-ability-item">
                    <div class="result-ability-label">🧊 くうかん・かたち</div>
                    <div class="result-ability-score" id="result-score-space">--</div>
                </div>
                <div class="result-ability-item">
                    <div class="result-ability-label">📏 ながさ・きょり</div>
                    <div class="result-ability-score" id="result-score-length">--</div>
                </div>
                <div class="result-ability-item" style="grid-column: span 2;">
                    <div class="result-ability-label">🎨 いろのかんかく</div>
                    <div class="result-ability-score" id="result-score-color">--</div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="location.reload()">
                🔄 もういちどそくてい
            </button>
            <a href="results2.html" class="home-link" style="color:#5c6bc0;">📊 せいせきをみる</a>
            <a href="../index.html" class="home-link">🏠 ホームへもどる</a>
        </div>
        <!-- /result-scene -->

    </div><!-- /labo-container -->

    <!-- ===== ゲームJSの読み込み ===== -->
    <script src="labo2_game1_quantity.js"></script>
    <script src="labo2_game2_speed.js"></script>
    <script src="labo2_game3_space.js"></script>
    <script src="labo2_game4_length.js"></script>
    <script src="labo2_game5_color.js"></script>
    <script src="result2.js"></script>
    <script src="main2.js"></script>

</body>

</html>
