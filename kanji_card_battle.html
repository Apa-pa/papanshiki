<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漢字カードバトル | ぱぱん式</title>
    <meta name="description" content="漢字の画数や意味でカードを出しあってバトル！1〜6年生の漢字カードで勝負しよう。">
    <script src="ranking.js"></script>
    <script src="sugoroku/mission.js"></script>
    <!-- 全学年の漢字データを静的に読み込む -->
    <script src="kanji/grade1.js"></script>
    <script src="kanji/grade2.js"></script>
    <script src="kanji/grade3.js"></script>
    <script src="kanji/grade4.js"></script>
    <script src="kanji/grade5.js"></script>
    <script src="kanji/grade6.js"></script>
    <style>
        /* =============================================
           基本スタイル
        ============================================= */
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "UD Digital Kyokasho-tai-R", "M PLUS Rounded 1c", "Helvetica Neue", Arial, Meiryo, sans-serif;
            background: linear-gradient(135deg, #fff9c4 0%, #e0f7fa 50%, #fce4ec 100%);
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
            user-select: none;
            min-height: 100vh;
        }

        /* キャラクター演出 */
        .char-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #f0f4f8;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid #e1e8ed;
        }

        .char-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            border: 3px solid #ff9800;
        }

        .char-bubble {
            position: relative;
            background: white;
            border-radius: 15px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            max-width: 200px;
            text-align: left;
        }

        .char-bubble::after {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 8px 10px 8px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* =============================================
           スタート画面
        ============================================= */
        #start-screen {
            background: white;
            border-radius: 25px;
            padding: 30px 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
        }

        .game-title {
            font-size: 32px;
            font-weight: 800;
            color: #e65100;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 0 #ffcc80;
        }

        .game-title-sub {
            font-size: 14px;
            color: #888;
            margin-bottom: 25px;
        }

        .card-preview {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .card-mini {
            width: 55px;
            height: 75px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            transform: rotate(var(--rot, 0deg));
        }

        /* 学年選択 */
        .grade-select-area {
            margin-bottom: 20px;
            text-align: left;
        }

        .grade-select-area label {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .grade-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .grade-btn {
            padding: 12px 5px;
            border: 3px solid #ddd;
            background: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            color: #555;
            transition: 0.15s;
            box-shadow: 0 3px #ddd;
        }

        .grade-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 #ddd;
        }

        .grade-btn.selected {
            background: #ff9800;
            border-color: #e65100;
            color: white;
            box-shadow: 0 3px #e65100;
        }

        /* スタートボタン */
        .btn {
            width: 100%;
            padding: 20px;
            font-size: 26px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
            display: block;
            text-align: center;
            text-decoration: none;
            line-height: normal;
            margin-bottom: 10px;
        }

        .btn-start {
            background: #ff9800;
            color: white;
            box-shadow: 0 5px #e65100;
        }

        .btn-start:active {
            transform: translateY(3px);
            box-shadow: 0 2px #e65100;
        }

        .btn-home {
            background: #90a4ae;
            color: white;
            box-shadow: 0 5px #607d8b;
        }

        .btn-home:active {
            transform: translateY(3px);
            box-shadow: 0 2px #607d8b;
        }

        /* =============================================
           ゲーム画面
        ============================================= */
        #game-screen {
            display: none;
        }

        /* ヘッダー */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .score-display {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .score-num {
            font-size: 22px;
            color: #ff9800;
        }

        .round-display {
            font-size: 14px;
            color: #777;
        }

        .quit-btn {
            background: none;
            border: 1px solid #bbb;
            color: #888;
            border-radius: 8px;
            font-size: 12px;
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
        }

        /* バトル条件バナー */
        .battle-condition {
            background: linear-gradient(135deg, #7b1fa2, #c2185b);
            color: white;
            border-radius: 15px;
            padding: 12px 20px;
            text-align: center;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(123,31,162,0.35);
        }

        .condition-label {
            font-size: 11px;
            opacity: 0.85;
            margin-bottom: 3px;
        }

        .condition-text {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.3;
            margin-top: 5px;
        }

        .condition-icon {
            font-size: 28px;
        }

        /* -----------------------
           タイマー用（新機能）
        ----------------------- */
        .time-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            margin-top: 10px;
            overflow: hidden;
            position: relative;
        }

        .time-bar {
            height: 100%;
            width: 100%;
            background: #ffeb3b;
            border-radius: 6px;
            box-shadow: 0 0 8px rgba(255, 235, 59, 0.8);
            transition: width 0.1s linear, background-color 0.3s;
        }
        
        .time-bar.danger {
            background: #f44336;
            box-shadow: 0 0 8px rgba(244, 67, 54, 0.8);
        }

        /* =============================================
           クイズモーダル（STEP1追加）
        ============================================= */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }
        @keyframes slideUp2 {
            from { transform: translateY(0);     opacity: 1; }
            to   { transform: translateY(-100%); opacity: 0; }
        }

        .quiz-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 500;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 30px;
        }

        .quiz-modal-box {
            background: white;
            border-radius: 25px;
            padding: 25px 20px 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideDown 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }

        .quiz-header {
            font-size: 14px;
            font-weight: bold;
            color: #7b1fa2;
            text-align: center;
            margin-bottom: 5px;
        }

        .quiz-target-kanji {
            font-size: 72px;
            text-align: center;
            line-height: 1;
            margin: 8px 0 4px;
        }

        .quiz-target-sub {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-bottom: 18px;
        }

        .quiz-question-text {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .quiz-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .quiz-choice-btn {
            padding: 14px 8px;
            font-size: 18px;
            font-weight: bold;
            border: 3px solid #e0e0e0;
            background: #fafafa;
            border-radius: 15px;
            cursor: pointer;
            font-family: inherit;
            color: #333;
            box-shadow: 0 3px #e0e0e0;
            transition: 0.1s;
            line-height: 1.3;
        }

        .quiz-choice-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 #e0e0e0;
        }

        .quiz-choice-btn.choice-correct {
            background: #e8f5e9;
            border-color: #4caf50;
            box-shadow: 0 3px #2e7d32;
            color: #1b5e20;
        }

        .quiz-choice-btn.choice-wrong {
            background: #fce4ec;
            border-color: #ef5350;
            box-shadow: 0 3px #c62828;
            color: #b71c1c;
        }

        .quiz-result-text {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 14px;
            min-height: 32px;
        }


        .battle-field {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .field-label {
            font-size: 12px;
            color: #555;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        /* 出されたカード表示エリア */
        .played-area {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vs-badge {
            font-size: 28px;
            font-weight: 800;
            color: #e65100;
            text-shadow: 2px 2px 0 #ffcc80;
        }

        /* 結果バナー */
        .result-banner {
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
            display: none;
            animation: popIn 0.3s ease-out;
        }

        .result-win {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .result-lose {
            background: #fce4ec;
            color: #c62828;
        }

        .result-draw {
            background: #fff9c4;
            color: #f57f17;
        }

        /* プレイヤーの手札 */
        .hand-area {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .hand-label {
            font-size: 13px;
            color: #777;
            margin-bottom: 10px;
            text-align: center;
        }

        .hand-cards {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* =============================================
           カードスタイル
        ============================================= */
        .kanji-card {
            width: 80px;
            min-height: 100px;
            border-radius: 12px;
            padding: 8px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative;
            border: 3px solid rgba(255,255,255,0.6);
        }

        .kanji-card:active {
            transform: translateY(2px) scale(0.97);
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        .kanji-card.selected {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
            border-color: #ff9800;
            outline: 3px solid #ff9800;
        }

        .kanji-card.used {
            opacity: 0.3;
            pointer-events: none;
        }

        .card-grade-badge {
            font-size: 9px;
            background: rgba(0,0,0,0.25);
            color: white;
            border-radius: 4px;
            padding: 1px 4px;
            align-self: flex-start;
        }

        .card-kanji-char {
            font-size: 36px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            line-height: 1;
            margin: 3px 0;
        }

        .card-reading {
            font-size: 11px;
            color: rgba(255,255,255,0.9);
            font-weight: bold;
        }

        .card-strokes {
            font-size: 10px;
            color: rgba(255,255,255,0.75);
        }

        /* カードの色テーマ（カード生成時にランダムで割り当て）*/
        .card-red    { background: linear-gradient(145deg, #ef5350, #b71c1c); }
        .card-blue   { background: linear-gradient(145deg, #42a5f5, #0d47a1); }
        .card-green  { background: linear-gradient(145deg, #66bb6a, #1b5e20); }
        .card-purple { background: linear-gradient(145deg, #ab47bc, #6a1b9a); }
        .card-orange { background: linear-gradient(145deg, #ffa726, #e65100); }
        .card-teal   { background: linear-gradient(145deg, #26c6da, #006064); }
        .card-pink   { background: linear-gradient(145deg, #ec407a, #880e4f); }
        .card-indigo { background: linear-gradient(145deg, #5c6bc0, #1a237e); }

        /* フィールドに出されたカード（大きめ） */
        .played-card {
            width: 100px;
            min-height: 130px;
            padding: 10px 8px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            border: 3px solid rgba(255,255,255,0.7);
        }

        .played-card .card-kanji-char {
            font-size: 46px;
        }

        .played-card .card-value {
            font-size: 13px;
            color: rgba(255,255,255,0.95);
            font-weight: bold;
            text-align: center;
            margin-top: 3px;
        }

        /* CPU側のカード（伏せ状態） */
        .cpu-card-back {
            width: 100px;
            min-height: 130px;
            border-radius: 15px;
            background: linear-gradient(145deg, #546e7a, #263238);
            border: 3px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .cpu-card-back-emoji {
            font-size: 40px;
            opacity: 0.5;
        }

        /* =============================================
           画面切り替えアニメーション
        ============================================= */
        @keyframes popIn {
            0%   { transform: scale(0.7); opacity: 0; }
            70%  { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-6px); }
            75%      { transform: translateX(6px); }
        }

        .animate-pop {
            animation: popIn 0.35s ease-out;
        }

        .animate-shake {
            animation: shake 0.3s ease-out;
        }

        /* =============================================
           エンディング画面
        ============================================= */
        #ending-screen {
            display: none;
            background: white;
            border-radius: 25px;
            padding: 30px 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            text-align: center;
        }

        .ending-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 10px;
            animation: popIn 0.5s ease-out;
        }

        .ending-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .ending-score {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }

        .stars-area {
            font-size: 36px;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        /* =============================================
           次へボタン
        ============================================= */
        .next-btn {
            width: 100%;
            padding: 16px;
            background: #ff9800;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px #e65100;
            margin-top: 10px;
        }

        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px #e65100;
        }

        .next-btn:disabled {
            background: #ccc;
            box-shadow: 0 5px #aaa;
            cursor: default;
        }

        /* =============================================
           ツールチップ（カードのヒント）
        ============================================= */
        .card-hint-tooltip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,30,0.9);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 14px;
            max-width: 300px;
            text-align: center;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card-hint-tooltip.show {
            opacity: 1;
        }

        /* =============================================
           ローディング
        ============================================= */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.8);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 30px;
        }

        /* バトル中のボタン無効化 */
        .hand-cards.locked .kanji-card {
            pointer-events: none;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ============================
         スタート画面
    ============================ -->
    <div id="start-screen">
        <h1 class="game-title">🃏 漢字カードバトル</h1>
        <p class="game-title-sub">かんじのちからで しょうぶしよう！</p>

        <!-- キャラクター登場 -->
        <div class="char-box">
            <img src="an192.webp" alt="アンちゃん" class="char-img">
            <div class="char-bubble">
                「アンと かんじで しょうぶだよ！ 10びょういないに こたえてね！」
            </div>
        </div>

        <!-- カードのプレビュー装飾 -->
        <div class="card-preview" aria-hidden="true">
            <div class="card-mini card-red"   style="--rot:-8deg;">山</div>
            <div class="card-mini card-blue"  style="--rot:-3deg;">海</div>
            <div class="card-mini card-green" style="--rot: 4deg;">空</div>
            <div class="card-mini card-orange"style="--rot: 9deg;">心</div>
        </div>

        <!-- 学年選択 -->
        <div class="grade-select-area">
            <label>🎒 なんねんせいのかんじ？</label>
            <div class="grade-btns" id="grade-btns">
                <button class="grade-btn selected" data-grade="1" onclick="selectGrade(1)">1年生</button>
                <button class="grade-btn" data-grade="2" onclick="selectGrade(2)">2年生</button>
                <button class="grade-btn" data-grade="3" onclick="selectGrade(3)">3年生</button>
                <button class="grade-btn" data-grade="4" onclick="selectGrade(4)">4年生</button>
                <button class="grade-btn" data-grade="5" onclick="selectGrade(5)">5年生</button>
                <button class="grade-btn" data-grade="6" onclick="selectGrade(6)">6年生</button>
            </div>
        </div>

        <button class="btn btn-start" onclick="gameStart()">🚀 ゲームスタート！</button>
        <a href="index.html" class="btn btn-home">🏠 ホームへ</a>
    </div>

    <!-- ============================
         ゲーム画面
    ============================ -->
    <div id="game-screen">

        <!-- ヘッダー -->
        <div class="game-header">
            <div class="score-display">
                🎯 せいかい数: <span class="score-num" id="player-score">0</span>
            </div>
            <div class="round-display" id="round-display">1 / 5 ラウンド</div>
            <button class="quit-btn" onclick="quitGame()">中断</button>
        </div>

        <!-- バトル条件 -->
        <div class="battle-condition">
            <div class="condition-label">このラウンドは...</div>
            <div class="condition-text" id="condition-text">画数が多い方が勝ち！</div>
            <div class="time-bar-container" id="time-bar-container" style="display:none;">
                <div class="time-bar" id="time-bar"></div>
            </div>
        </div>

        <!-- フィールド -->
        <div class="battle-field" style="grid-template-columns: 1fr;">
            <div>
                <div class="field-label">🔎 だしたカード</div>
                <div class="played-area" id="player-played-area" style="min-height:120px;">
                    <!-- 出したカードがここに表示 -->
                </div>
            </div>
        </div>

        <!-- 結果バナー -->
        <div class="result-banner" id="result-banner"></div>

        <!-- プレイヤーの手札 -->
        <div class="hand-area">
            <div class="hand-label" id="hand-label">🃏 てふだ — どれをだす？</div>
            <div class="hand-cards" id="hand-cards"></div>
        </div>

        <!-- 次のラウンドへ -->
        <button class="next-btn" id="next-btn" onclick="nextRound()" style="display:none;" disabled>
            つぎのラウンドへ →
        </button>

    </div>

    <!-- ============================
         エンディング画面
    ============================ -->
    <div id="ending-screen">
        <span class="ending-emoji" id="ending-emoji">🏆</span>
        <div class="ending-title" id="ending-title">すごい！</div>
        <div class="ending-score" id="ending-score">5戦 3勝 1敗 1引き分け</div>
        <div class="stars-area" id="ending-stars">⭐⭐⭐</div>
        <button class="next-btn" id="point-btn" onclick="getPoint()">🎁 ポイントをもらう！</button>
        <a href="index.html" class="btn btn-home" style="margin-top:10px; display:block; padding:16px; border-radius:30px; text-decoration:none;">🏠 ホームへ</a>
    </div>

</div>



<!-- ヒントツールチップ -->
<div class="card-hint-tooltip" id="hint-tooltip"></div>

<!-- ローディング -->
<div id="loading-overlay" style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:9999; align-items:center; justify-content:center; font-size:30px; flex-direction:column;">
    ⏳ よみこみちゅう...
</div>

<script>
    // =============================================
    // データ管理
    // =============================================

    // 選択した学年（デフォルト1）
    let selectedGrade = 1;

    // 学年ごとのカードデータ（外部JSをロード後に格納）
    let kanjiData = [];

    // バトルデータ
    let BATTLE_CONDITIONS; // バトル条件の初期化（関数後）

        // ゲーム状態
    let playerHand = [];
    let targetCards = [];
    let questions = [];
    let currentQuestionIndex = 0;
    let currentPhase = 1;
    const MAX_PHASES = 2; // 前半・後半の2セット
    const QUESTIONS_PER_PHASE = 6;
    let correctAnswersCount = 0;

    let questionTimer = null;
    let timeRemaining = 0;
    const TIME_LIMIT = 10; // 10 seconds (changed from 8)

    let lastPlayedCard = null;
    let lastPlayResult = ""; // "correct", "wrong", "timeout"

    const CARD_COLORS = [
        'card-red','card-blue','card-green','card-purple',
        'card-orange','card-teal','card-pink','card-indigo'
    ];

    function selectGrade(grade) {
        selectedGrade = grade;
        document.querySelectorAll('.grade-btn').forEach(btn => {
            btn.classList.toggle('selected', Number(btn.dataset.grade) === grade);
        });
    }

    function getGradeData(grade) {
        switch (grade) {
            case 1: return GRADE1_KANJI;
            case 2: return GRADE2_KANJI;
            case 3: return GRADE3_KANJI;
            case 4: return GRADE4_KANJI;
            case 5: return GRADE5_KANJI;
            case 6: return GRADE6_KANJI;
            default: return null;
        }
    }

    // =============================================
    // ゲームスタート
    // =============================================
    function gameStart() {
        kanjiData = getGradeData(selectedGrade);
        if (!kanjiData || kanjiData.length < 10) {
            alert('データがみつかりません。\nページをリロードしてみてください。');
            return;
        }

        correctAnswersCount = 0;
        currentPhase = 1;

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';

        dealPhase();
    }

    // =============================================
    // 手札を10枚配るフェーズ
    // =============================================
    function dealPhase() {
        if (currentPhase > MAX_PHASES) {
            showEnding();
            return;
        }

        // 10枚引く
        const shuffled = shuffle([...kanjiData]);
        playerHand = shuffled.slice(0, 10).map((k, i) => ({
            ...k,
            colorClass: CARD_COLORS[Math.floor(Math.random() * CARD_COLORS.length)],
            used: false,
            id: i
        }));

        // ターゲットを6枚選ぶ
        targetCards = shuffle([...playerHand]).slice(0, QUESTIONS_PER_PHASE);

        // 6つのお題を作る（各2問）
        const types = shuffle(['stroke', 'stroke', 'meaning', 'meaning', 'example', 'example']);
        questions = targetCards.map((card, i) => {
            const type = types[i];
            let qText = '';
            
            if (type === 'stroke') {
                qText = `<ruby>画数<rt>かくすう</rt></ruby>が「${card.strokes}」かく の漢字カード！`;
            } else if (type === 'meaning') {
                qText = `<ruby>意味<rt>いみ</rt></ruby>が「${card.meaning}」の漢字カード！`;
            } else if (type === 'example') {
                // 例文から漢字を〇に置き換えたものを出題
                let exText = card.example.replace(card.kanji, '〇');
                qText = `<ruby>例文<rt>れいぶん</rt></ruby>「${exText}」の〇にあう漢字カード！`;
            }

            return {
                type: type,
                targetCard: card,
                text: qText
            };
        });

        // シャッフルして問題セット完成
        questions = shuffle(questions);
        currentQuestionIndex = 0;

        document.getElementById('player-score').textContent = correctAnswersCount;
        
        renderHand();
        nextQuestion();
    }

    // =============================================
    // 手札の描画
    // =============================================
    function renderHand() {
        const container = document.getElementById('hand-cards');
        container.innerHTML = '';
        container.classList.remove('locked');

        playerHand.forEach((card, idx) => {
            const el = document.createElement('div');
            el.className = `kanji-card ${card.colorClass}`;
            if (card.used) {
                el.classList.add('used');
            } else {
                el.onclick = () => playCard(idx);
            }
            
            // 画数と読み方は隠す（HTMLタグを出さない）
            el.innerHTML = `
                <span class="card-grade-badge">${selectedGrade}年</span>
                <span class="card-kanji-char">${card.kanji}</span>
            `;

            // 長押しヒントは残す
            let pressTimer = null;
            el.addEventListener('touchstart', () => {
                pressTimer = setTimeout(() => showHint(card), 500);
            });
            el.addEventListener('touchend', () => clearTimeout(pressTimer));

            container.appendChild(el);
        });
    }

    // =============================================
    // 次の問題へ
    // =============================================
    function nextQuestion() {
        const banner = document.getElementById('result-banner');
        banner.style.display = 'none';

        if (currentQuestionIndex >= QUESTIONS_PER_PHASE) {
            // フェーズ切り替え
            currentPhase++;
            document.getElementById('condition-text').innerHTML = `⏳ つぎのセットへ...`;
            setTimeout(dealPhase, 1200);
            return;
        }

        const q = questions[currentQuestionIndex];
        document.getElementById('condition-text').innerHTML = q.text;
        document.getElementById('round-display').textContent = `第 ${currentPhase} セット （${currentQuestionIndex + 1} / ${QUESTIONS_PER_PHASE} 問）`;
        document.getElementById('player-played-area').innerHTML = `
            <div style="font-size:50px; opacity:0.1; margin-top:20px;">❓</div>
        `;
        document.getElementById('hand-cards').classList.remove('locked');
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'none';
        nextBtn.disabled = true;

        renderHand();
        startTimer();
    }

    // =============================================
    // カードを出す
    // =============================================
    function playCard(handIndex) {
        const card = playerHand[handIndex];
        if (!card || card.used) return;

        stopTimer();

        document.getElementById('hand-cards').classList.add('locked');
        // カードを一時的に使用済みにする（判定中に出せないように）
        card.used = true;
        lastPlayedCard = card;

        renderHand(); // 使ったカードをグレーにする

        const reading = (card.example_reading && card.example_reading[0]) ? card.example_reading[0] : (card.readings[0] || '');

        // 出したカードの情報を詳しく表示
        document.getElementById('player-played-area').innerHTML = `
            <div class="played-card ${card.colorClass} animate-pop">
                <span class="card-grade-badge">${selectedGrade}年</span>
                <span class="card-kanji-char" style="font-size:40px; margin: 5px 0;">${card.kanji}</span>
                <span style="font-size:12px; color:rgba(255,255,255,0.9); font-weight:bold;">${reading}</span>
                <span style="font-size:10px; color:rgba(255,255,255,0.7);">${card.strokes}かく</span>
            </div>`;

        // 判定
        const q = questions[currentQuestionIndex];
        let isCorrect = false;

        if (q.type === 'stroke') {
            isCorrect = (card.strokes === q.targetCard.strokes);
        } else if (q.type === 'meaning') {
            isCorrect = (card.meaning === q.targetCard.meaning);
        } else if (q.type === 'example') {
            isCorrect = (card.kanji === q.targetCard.kanji);
        }

        const banner = document.getElementById('result-banner');
        if (isCorrect) {
            lastPlayResult = "correct";
            correctAnswersCount++;
            document.getElementById('player-score').textContent = correctAnswersCount;
            banner.className = 'result-banner result-win animate-pop';
            banner.innerHTML = `🎉 せいかい！`;
        } else {
            lastPlayResult = "wrong";
            banner.className = 'result-banner result-lose animate-pop';
            banner.innerHTML = `💦 ちがうよ！（正解は「${q.targetCard.kanji}」）`;
            // クイズに失敗したら正解のヒントを表示
            const tooltip = document.getElementById('hint-tooltip');
            tooltip.textContent = `💡 正解「${q.targetCard.kanji}」：${q.targetCard.meaning} ／ ヒント：${q.targetCard.hint}`;
            tooltip.classList.add('show');
            setTimeout(() => tooltip.classList.remove('show'), 3500);
        }
        banner.style.display = 'block';

        // 次へボタンの表示
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        nextBtn.disabled = false;
        
        if (currentPhase === MAX_PHASES && currentQuestionIndex === QUESTIONS_PER_PHASE - 1) {
            nextBtn.textContent = '🏁 けっかをみる！';
        } else {
            nextBtn.textContent = 'つぎのもんだいへ →';
        }
    }

    function nextRound() {
        const tooltip = document.getElementById('hint-tooltip');
        tooltip.classList.remove('show');

        // もし間違えた場合は、そのカードを復活させる
        if (lastPlayResult === "wrong" && lastPlayedCard) {
            lastPlayedCard.used = false;
        }

        currentQuestionIndex++;
        nextQuestion();
    }

    // =============================================
    // エンディング画面表示
    // =============================================
    function showEnding() {
        document.getElementById('game-screen').style.display    = 'none';
        document.getElementById('ending-screen').style.display = 'block';

        let emoji, title;
        if (correctAnswersCount >= 10)     { emoji = '👑'; title = 'かんぺきしょう！'; }
        else if (correctAnswersCount >= 7) { emoji = '🏆'; title = 'すごい！'; }
        else if (correctAnswersCount >= 4) { emoji = '🎉'; title = 'よくがんばった！'; }
        else if (correctAnswersCount >= 1) { emoji = '😊'; title = 'つぎはもっとがんばろう！'; }
        else                               { emoji = '😅'; title = 'また ちょうせんしてね！'; }

        document.getElementById('ending-emoji').textContent = emoji;
        document.getElementById('ending-title').textContent = title;
        document.getElementById('ending-stars').textContent = '';
        document.getElementById('ending-score').textContent = 
            `ぜんぶで ${MAX_PHASES * QUESTIONS_PER_PHASE}もん中 ${correctAnswersCount}もん せいかい！`;
    }

    // =============================================
    // ポイント付与
    // =============================================
    function getPoint() {
        // タイプD: 成績連動（正解数 × 5ポイント）
        const point = correctAnswersCount * 5;
        document.getElementById('point-btn').disabled = true;
        document.getElementById('point-btn').textContent = '🎁　もらったよ！';
        
        showPointGetDialog(point, 'kanji_card_battle', (selectedUserName) => {
            // ミッション達成を記録
            if (selectedUserName && typeof addMissionStock === 'function') {
                addMissionStock(selectedUserName, 'kanji_card_battle');
            }
            // ポイントをもらったらリセットするためにリロード
            window.location.reload();
        });
    }

    // =============================================
    // タイマー関連ロジック
    // =============================================
    function startTimer() {
        if (questionTimer) clearInterval(questionTimer);
        const barContainer = document.getElementById('time-bar-container');
        const bar = document.getElementById('time-bar');
        barContainer.style.display = 'block';
        
        timeRemaining = TIME_LIMIT;
        bar.style.transition = 'none';
        bar.style.width = '100%';
        bar.classList.remove('danger');
        
        setTimeout(() => {
            bar.style.transition = `width ${TIME_LIMIT}s linear, background-color 0.3s`;
            bar.style.width = '0%';
        }, 50);

        let elapsed = 0;
        questionTimer = setInterval(() => {
            elapsed += 0.1;
            if (TIME_LIMIT - elapsed <= 3) {
                bar.classList.add('danger');
            }
            if (elapsed >= TIME_LIMIT) {
                clearInterval(questionTimer);
                questionTimer = null;
                onTimeUp();
            }
        }, 100);
    }

    function stopTimer() {
        if (questionTimer) {
            clearInterval(questionTimer);
            questionTimer = null;
        }
        const bar = document.getElementById('time-bar');
        const currentWidth = window.getComputedStyle(bar).width;
        bar.style.transition = 'none';
        bar.style.width = currentWidth;
    }

    function onTimeUp() {
        stopTimer();
        document.getElementById('hand-cards').classList.add('locked');
        
        const q = questions[currentQuestionIndex];
        const handIndex = playerHand.findIndex(c => c.id === q.targetCard.id);
        const card = playerHand[handIndex];
        
        if (card) {
            card.used = true;
            lastPlayedCard = card;
            lastPlayResult = "timeout"; // タイムアウト時は復活させない
            renderHand(); // 使われたカードをグレーにする
        }
        
        document.getElementById('player-played-area').innerHTML = `
            <div style="font-size:50px; opacity:0.5; margin-top:20px;">💨</div>
        `;
        
        const banner = document.getElementById('result-banner');
        banner.className = 'result-banner result-lose animate-pop';
        banner.innerHTML = `💦 じかんぎれ！<br><small>アンちゃんに「${q.targetCard.kanji}」を とられた！</small>`;
        banner.style.display = 'block';

        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        nextBtn.disabled = false;
        
        if (currentPhase === MAX_PHASES && currentQuestionIndex === QUESTIONS_PER_PHASE - 1) {
            nextBtn.textContent = '🏁 けっかをみる！';
        } else {
            nextBtn.textContent = 'つぎのもんだいへ →';
        }
    }

    // =============================================
    // 中断
    // =============================================
    function quitGame() {
        if (!confirm('ゲームをやめますか？')) return;
        document.getElementById('game-screen').style.display   = 'none';
        document.getElementById('start-screen').style.display  = 'block';
        document.getElementById('ending-screen').style.display = 'none';
    }

    // =============================================
    // 長押し用ヒント
    // =============================================
    function showHint(card) {
        const reading = (card.example_reading && card.example_reading[0]) ? card.example_reading[0] : (card.readings[0] || '');
        const tooltip = document.getElementById('hint-tooltip');
        tooltip.textContent = `💡 ${card.kanji}（${reading}）：${card.meaning} ／ ${card.hint}`;
        tooltip.classList.add('show');
        setTimeout(() => tooltip.classList.remove('show'), 2500);
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
</script>
</body>
</html>
